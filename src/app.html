<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<!-- Critical paint: match canvas before layout.css loads (avoids white FOUC) -->
		<style>
			html,
			body {
				margin: 0;
				height: 100%;
				background: #1d201d;
				color: #fff7df;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
